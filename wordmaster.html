<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">

<title>워드마스터 수능 2000 · 50일 학습 프로그램</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #faf9f6;
    --surface: #ffffff;
    --surface-alt: #f3f1ea;
    --border: rgba(0,0,0,0.08);
    --border-strong: rgba(0,0,0,0.18);
    --text: #1a1a1a;
    --text-secondary: #555;
    --text-tertiary: #888;
    --accent: #2563eb;
    --accent-bg: #eff4ff;
    --success: #0f6e56;
    --success-bg: #e1f5ee;
    --danger: #991b1b;
    --danger-bg: #fcebeb;
    --amber: #854f0b;
    --amber-bg: #faeeda;
    --radius: 8px;
    --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #18181a;
      --surface: #232325;
      --surface-alt: #2a2a2d;
      --border: rgba(255,255,255,0.08);
      --border-strong: rgba(255,255,255,0.18);
      --text: #eaeaea;
      --text-secondary: #b0b0b0;
      --text-tertiary: #888;
      --accent: #6ea3ff;
      --accent-bg: #1a2740;
      --success: #5dcaa5;
      --success-bg: #0f2a22;
      --danger: #f09595;
      --danger-bg: #3a1a1a;
      --amber: #fac775;
      --amber-bg: #3a2a12;
    }
  }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    padding: 20px 14px;
    padding-bottom: calc(20px + env(safe-area-inset-bottom));
  }
  .container { max-width: 920px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 18px; }
  .header h1 { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
  .header .sub { font-size: 12px; color: var(--text-secondary); }
  .nav-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 10px;
    margin-bottom: 14px;
  }
  .mode-tabs { display: flex; gap: 4px; margin-bottom: 10px; }
  .mode-tab {
    flex: 1;
    padding: 10px 8px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 14px;
    color: var(--text-secondary);
    font-family: inherit;
    -webkit-appearance: none;
  }
  .mode-tab:active { background: var(--surface-alt); }
  .mode-tab.active {
    background: var(--accent-bg);
    color: var(--accent);
    border-color: var(--accent);
    font-weight: 500;
  }
  .day-grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 4px;
  }
  .day-btn {
    padding: 10px 0 14px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: transparent;
    cursor: pointer;
    font-size: 12px;
    color: var(--text-secondary);
    font-family: inherit;
    position: relative;
    -webkit-appearance: none;
    min-height: 40px;
  }
  .day-btn:active { background: var(--surface-alt); }
  .day-btn.active {
    background: var(--accent-bg);
    color: var(--accent);
    border-color: var(--accent);
    font-weight: 500;
  }
  .day-btn .pct {
    position: absolute;
    bottom: 2px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    color: var(--success);
  }
  .day-btn.complete {
    border-color: var(--success);
    color: var(--success);
  }
  .options-row {
    display: flex;
    gap: 12px;
    align-items: center;
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .options-row label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
  .options-row input[type="checkbox"] { cursor: pointer; width: 16px; height: 16px; }
  .filter-btn {
    padding: 4px 10px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: transparent;
    cursor: pointer;
    font-size: 12px;
    color: var(--text-secondary);
    font-family: inherit;
  }
  .filter-btn.active {
    background: var(--amber-bg);
    color: var(--amber);
    border-color: var(--amber);
  }
  .main {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px;
    min-height: 340px;
  }
  .word-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    margin-bottom: 5px;
    display: flex;
    gap: 10px;
    align-items: baseline;
    cursor: pointer;
    transition: background 0.1s;
  }
  .word-card:active { background: var(--surface-alt); }
  .word-card.known {
    background: var(--success-bg);
    border-color: var(--success);
  }
  .word-card.core {
    border-left: 3px solid var(--amber);
  }
  .word-num { font-size: 11px; color: var(--text-tertiary); min-width: 28px; }
  .word-main { flex: 1; min-width: 0; }
  .word-header { display: flex; gap: 8px; align-items: baseline; margin-bottom: 2px; flex-wrap: wrap; }
  .word-text { font-size: 16px; font-weight: 500; word-break: break-word; }
  .word-pos {
    font-size: 11px;
    color: var(--text-tertiary);
    padding: 1px 6px;
    background: var(--surface-alt);
    border-radius: var(--radius);
    font-style: italic;
    white-space: nowrap;
  }
  .word-meaning { font-size: 14px; color: var(--text-secondary); line-height: 1.45; }
  .word-example {
    font-size: 13px;
    color: var(--text-tertiary);
    font-style: italic;
    margin-top: 4px;
    line-height: 1.45;
    padding-left: 8px;
    border-left: 2px solid var(--border);
  }
  .check-mark { font-size: 14px; color: var(--success); min-width: 16px; }
  .flashcard {
    min-height: 280px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 32px 20px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    text-align: center;
    transition: border-color 0.15s;
    -webkit-user-select: none;
    user-select: none;
  }
  .flashcard:active { border-color: var(--border-strong); }
  .flashcard-word { font-size: 40px; font-weight: 500; margin-bottom: 6px; word-break: break-word; line-height: 1.15; }
  .flashcard-pos { font-size: 14px; color: var(--text-tertiary); font-style: italic; margin-bottom: 12px; }
  .flashcard-meaning { font-size: 20px; color: var(--text); font-weight: 500; max-width: 640px; line-height: 1.45; margin-bottom: 12px; }
  .flashcard-example {
    font-size: 15px;
    color: var(--text-secondary);
    font-style: italic;
    max-width: 640px;
    line-height: 1.5;
    padding: 8px 12px;
    border-left: 2px solid var(--accent);
    background: var(--accent-bg);
    border-radius: var(--radius);
    margin-top: 8px;
  }
  .flashcard-hint { font-size: 12px; color: var(--text-tertiary); margin-top: 18px; }
  .fc-nav {
    display: flex;
    gap: 6px;
    justify-content: space-between;
    align-items: center;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .fc-nav-side { display: flex; gap: 6px; flex-wrap: wrap; }
  .btn {
    padding: 10px 14px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: transparent;
    cursor: pointer;
    font-size: 14px;
    color: var(--text);
    font-family: inherit;
    -webkit-appearance: none;
    min-height: 40px;
    touch-action: manipulation;
  }
  .btn:active { background: var(--surface-alt); }
  .btn.success { color: var(--success); border-color: var(--success); }
  .btn.success:active { background: var(--success-bg); }
  .btn.danger { color: var(--danger); border-color: var(--danger); }
  .btn.danger:active { background: var(--danger-bg); }
  .fc-counter { font-size: 13px; color: var(--text-secondary); white-space: nowrap; padding: 0 6px; }
  .quiz-status {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 12px;
  }
  .quiz-question { font-size: 36px; font-weight: 500; text-align: center; margin: 20px 0 6px; word-break: break-word; line-height: 1.15; }
  .quiz-pos { font-size: 13px; color: var(--text-tertiary); font-style: italic; text-align: center; margin-bottom: 18px; }
  .quiz-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 10px;
  }
  @media (max-width: 600px) {
    body { padding: 14px 10px; }
    .quiz-options { grid-template-columns: 1fr; }
    .quiz-question { font-size: 28px; }
    .flashcard-word { font-size: 32px; }
    .flashcard-meaning { font-size: 18px; }
    .day-grid { grid-template-columns: repeat(5, 1fr); }
    .header h1 { font-size: 18px; }
    .main { padding: 14px; }
    .flashcard { padding: 28px 16px; min-height: 250px; }
    .flashcard-example { font-size: 14px; }
  }
  .quiz-option {
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    cursor: pointer;
    font-size: 14px;
    text-align: left;
    color: var(--text);
    font-family: inherit;
    line-height: 1.4;
    transition: background 0.1s;
    -webkit-appearance: none;
    min-height: 44px;
    touch-action: manipulation;
  }
  .quiz-option:active:not(.disabled) { background: var(--surface-alt); }
  .quiz-option.correct {
    background: var(--success-bg);
    color: var(--success);
    border-color: var(--success);
    font-weight: 500;
  }
  .quiz-option.wrong {
    background: var(--danger-bg);
    color: var(--danger);
    border-color: var(--danger);
  }
  .quiz-option.disabled { cursor: default; pointer-events: none; }
  .quiz-result { text-align: center; padding: 28px 12px; }
  .quiz-score { font-size: 52px; font-weight: 500; line-height: 1; }
  .quiz-score-label { font-size: 14px; color: var(--text-secondary); margin-top: 8px; }
  .quiz-bar {
    margin: 20px auto;
    width: 280px;
    max-width: 100%;
    height: 8px;
    background: var(--surface-alt);
    border-radius: 4px;
    overflow: hidden;
  }
  .quiz-fill { height: 100%; background: var(--success); transition: width 0.6s ease; }
  .progress-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 12px;
    padding: 10px 14px;
    background: var(--surface-alt);
    border-radius: var(--radius);
    font-size: 13px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .progress-value { font-weight: 500; color: var(--text); }
  .progress-label { color: var(--text-secondary); }
  .reset-btn {
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--text-tertiary);
    font-size: 12px;
    text-decoration: underline;
    font-family: inherit;
    padding: 4px 6px;
  }
  .reset-btn:active { color: var(--danger); }
  .footer-note {
    text-align: center;
    font-size: 11px;
    color: var(--text-tertiary);
    margin-top: 14px;
  }
  .legend { font-size: 11px; color: var(--text-tertiary); margin-left: auto; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-swatch { width: 3px; height: 14px; background: var(--amber); display: inline-block; }
</style>

erinarian","","수의사",""],["vet","","수의사, (동물을) 진료시키다",""],["surgeon","","외과 의사",""],["physician","","내과 의사",""],["dentist","","치과 의사",""],["grudge","","원한, 유감",""]]};
const TOTAL_DAYS = 50;
const STORAGE_KEY = 'wordmaster_progress_v1';

const state = {
  day: 1,
  mode: 'browse',
  fcIdx: 0,
  flipped: false,
  shuffle: false,
  coreOnly: false,
  quizIdx: 0,
  quizAnswered: false,
  quizScore: 0,
  quizOptions: [],
  quizOrder: [],
  known: {},
  order: {}
};

// Initialize
for (let d = 1; d <= TOTAL_DAYS; d++) {
  state.known[d] = new Set();
  state.order[d] = VOCAB[d].map((_, i) => i);
}

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.known) {
      for (const d in data.known) {
        if (state.known[d]) state.known[d] = new Set(data.known[d]);
      }
    }
    if (data.day) state.day = data.day;
    if (data.mode) state.mode = data.mode;
    if (typeof data.coreOnly === 'boolean') state.coreOnly = data.coreOnly;
  } catch (e) {
    console.warn('Failed to load progress', e);
  }
}

function saveProgress() {
  try {
    const knownObj = {};
    for (const d in state.known) knownObj[d] = [...state.known[d]];
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      known: knownObj,
      day: state.day,
      mode: state.mode,
      coreOnly: state.coreOnly
    }));
  } catch (e) {
    console.warn('Failed to save progress', e);
  }
}

const $ = id => document.getElementById(id);

function shuffleArr(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function isCore(word) {
  return word[1] !== ""; // has POS
}

function getActiveIndices() {
  // Returns indices of VOCAB[state.day] based on order and coreOnly filter
  const baseOrder = state.order[state.day];
  if (!state.coreOnly) return baseOrder;
  return baseOrder.filter(i => isCore(VOCAB[state.day][i]));
}

function currentWords() {
  const indices = getActiveIndices();
  return indices.map(i => {
    const v = VOCAB[state.day][i];
    return { w: v[0], p: v[1], m: v[2], e: v[3], _idx: i };
  });
}

function pickWrongMeanings(day, correctIdx, n) {
  const correctMeaning = VOCAB[day][correctIdx][2];
  const pool = [];
  for (let d = 1; d <= TOTAL_DAYS; d++) {
    VOCAB[d].forEach((v, i) => {
      if (v[2] !== correctMeaning) pool.push(v[2]);
    });
  }
  return shuffleArr(pool).slice(0, n);
}

function renderNav() {
  const modes = [
    { id: 'browse', label: '단어장' },
    { id: 'flashcard', label: '플래시카드' },
    { id: 'quiz', label: '퀴즈' }
  ];
  $('modeTabs').innerHTML = modes.map(m =>
    `<button class="mode-tab ${state.mode === m.id ? 'active' : ''}" data-mode="${m.id}">${m.label}</button>`
  ).join('');
  $('modeTabs').querySelectorAll('.mode-tab').forEach(btn => {
    btn.onclick = () => setMode(btn.dataset.mode);
  });

  let dayHtml = '';
  for (let d = 1; d <= TOTAL_DAYS; d++) {
    const total = VOCAB[d].length;
    const known = state.known[d].size;
    const complete = known === total && total > 0;
    const pct = total > 0 ? Math.round((known / total) * 100) : 0;
    const pctText = known > 0 && !complete ? `<span class="pct">${pct}%</span>` : '';
    dayHtml += `<button class="day-btn ${state.day === d ? 'active' : ''} ${complete ? 'complete' : ''}" data-day="${d}">${d}${pctText}</button>`;
  }
  $('daySelector').innerHTML = dayHtml;
  $('daySelector').querySelectorAll('.day-btn').forEach(btn => {
    btn.onclick = () => setDay(parseInt(btn.dataset.day));
  });
}

function renderBrowse() {
  const words = currentWords();
  const head = `
    <div class="options-row">
      <label><input type="checkbox" id="shuffleChk" ${state.shuffle ? 'checked' : ''}> 순서 섞기</label>
      <button class="filter-btn ${state.coreOnly ? 'active' : ''}" id="coreBtn">핵심 단어만</button>
      <span class="legend">
        <span class="legend-item"><span class="legend-swatch"></span>예문 포함</span>
      </span>
    </div>
  `;
  const list = words.map((v, i) => {
    const isKnown = state.known[state.day].has(v._idx);
    const core = v.p !== "";
    return `<div class="word-card ${isKnown ? 'known' : ''} ${core ? 'core' : ''}" data-idx="${v._idx}">
      <div class="word-num">${String(i+1).padStart(2,'0')}</div>
      <div class="word-main">
        <div class="word-header">
          <span class="word-text">${v.w}</span>
          ${v.p ? `<span class="word-pos">${v.p}</span>` : ''}
        </div>
        <div class="word-meaning">${v.m}</div>
        ${v.e ? `<div class="word-example">${v.e}</div>` : ''}
      </div>
      <div class="check-mark">${isKnown ? '✓' : ''}</div>
    </div>`;
  }).join('');
  $('mainContent').innerHTML = head + list;
  $('shuffleChk').onchange = e => {
    state.shuffle = e.target.checked;
    state.order[state.day] = state.shuffle
      ? shuffleArr(VOCAB[state.day].map((_, i) => i))
      : VOCAB[state.day].map((_, i) => i);
    renderContent();
  };
  $('coreBtn').onclick = () => {
    state.coreOnly = !state.coreOnly;
    saveProgress();
    renderContent();
  };
  $('mainContent').querySelectorAll('.word-card').forEach(card => {
    card.onclick = () => {
      const idx = parseInt(card.dataset.idx);
      if (state.known[state.day].has(idx)) state.known[state.day].delete(idx);
      else state.known[state.day].add(idx);
      saveProgress();
      renderNav();
      renderBrowse();
      renderProgress();
    };
  });
}

function renderFlashcard() {
  const words = currentWords();
  if (words.length === 0) {
    $('mainContent').innerHTML = `<div style="text-align:center;padding:60px 20px;color:var(--text-secondary);">표시할 단어가 없습니다.<br><small>핵심 단어 필터를 해제해 보세요.</small></div>`;
    return;
  }
  if (state.fcIdx >= words.length) state.fcIdx = 0;
  const v = words[state.fcIdx];
  const total = words.length;
  const isKnown = state.known[state.day].has(v._idx);

  const head = `
    <div class="options-row">
      <label><input type="checkbox" id="shuffleFc" ${state.shuffle ? 'checked' : ''}> 순서 섞기</label>
      <button class="filter-btn ${state.coreOnly ? 'active' : ''}" id="coreBtn">핵심 단어만</button>
    </div>
  `;
  const card = state.flipped
    ? `<div class="flashcard" id="fcCard">
        <div class="flashcard-pos">${v.w}${v.p ? ' · ' + v.p : ''}</div>
        <div class="flashcard-meaning">${v.m}</div>
        ${v.e ? `<div class="flashcard-example">${v.e}</div>` : ''}
        <div class="flashcard-hint">카드 탭 → 영어 단어로</div>
       </div>`
    : `<div class="flashcard" id="fcCard">
        <div class="flashcard-word">${v.w}</div>
        ${v.p ? `<div class="flashcard-pos">${v.p}</div>` : ''}
        <div class="flashcard-hint">카드 탭 → 뜻 보기${isKnown ? ' · ✓ 암기됨' : ''}</div>
       </div>`;

  const nav = `
    <div class="fc-nav">
      <button class="btn" id="fcPrev">← 이전</button>
      <span class="fc-counter">${state.fcIdx + 1} / ${total}</span>
      <div class="fc-nav-side">
        <button class="btn danger" id="fcUnknown">모름</button>
        <button class="btn success" id="fcKnown">암기</button>
        <button class="btn" id="fcNext">다음 →</button>
      </div>
    </div>
  `;
  $('mainContent').innerHTML = head + card + nav;
  $('shuffleFc').onchange = e => {
    state.shuffle = e.target.checked;
    state.order[state.day] = state.shuffle
      ? shuffleArr(VOCAB[state.day].map((_, i) => i))
      : VOCAB[state.day].map((_, i) => i);
    state.fcIdx = 0;
    state.flipped = false;
    renderContent();
  };
  $('coreBtn').onclick = () => {
    state.coreOnly = !state.coreOnly;
    state.fcIdx = 0;
    state.flipped = false;
    saveProgress();
    renderContent();
  };
  $('fcCard').onclick = () => {
    state.flipped = !state.flipped;
    renderFlashcard();
  };
  $('fcPrev').onclick = e => {
    e.stopPropagation();
    state.fcIdx = (state.fcIdx - 1 + total) % total;
    state.flipped = false;
    renderFlashcard();
  };
  $('fcNext').onclick = e => {
    e.stopPropagation();
    state.fcIdx = (state.fcIdx + 1) % total;
    state.flipped = false;
    renderFlashcard();
  };
  $('fcKnown').onclick = e => {
    e.stopPropagation();
    state.known[state.day].add(v._idx);
    saveProgress();
    state.fcIdx = (state.fcIdx + 1) % total;
    state.flipped = false;
    renderNav();
    renderFlashcard();
    renderProgress();
  };
  $('fcUnknown').onclick = e => {
    e.stopPropagation();
    state.known[state.day].delete(v._idx);
    saveProgress();
    state.fcIdx = (state.fcIdx + 1) % total;
    state.flipped = false;
    renderNav();
    renderFlashcard();
    renderProgress();
  };
}

function startQuiz() {
  state.quizIdx = 0;
  state.quizScore = 0;
  state.quizAnswered = false;
  // Quiz uses all words in the day (not affected by coreOnly)
  const indices = VOCAB[state.day].map((_, i) => i);
  state.quizOrder = shuffleArr(indices);
  prepareQuizOptions();
}

function prepareQuizOptions() {
  const correctIdx = state.quizOrder[state.quizIdx];
  const correct = VOCAB[state.day][correctIdx];
  const wrongs = pickWrongMeanings(state.day, correctIdx, 3);
  const options = shuffleArr([correct[2], ...wrongs]);
  state.quizOptions = options.map(m => ({ text: m, correct: m === correct[2], _picked: false }));
}

function renderQuiz() {
  const qTotal = state.quizOrder.length;
  if (state.quizIdx >= qTotal) {
    const pct = Math.round((state.quizScore / qTotal) * 100);
    $('mainContent').innerHTML = `
      <div class="quiz-result">
        <div class="quiz-score">${state.quizScore} / ${qTotal}</div>
        <div class="quiz-score-label">정답률 ${pct}%</div>
        <div class="quiz-bar"><div class="quiz-fill" style="width:${pct}%"></div></div>
        <button class="btn" id="restartQuiz">다시 풀기</button>
      </div>
    `;
    $('restartQuiz').onclick = () => { startQuiz(); renderQuiz(); };
    return;
  }

  const correctIdx = state.quizOrder[state.quizIdx];
  const v = VOCAB[state.day][correctIdx];

  const opts = state.quizOptions.map((o, i) => {
    let cls = 'quiz-option';
    if (state.quizAnswered) {
      cls += ' disabled';
      if (o.correct) cls += ' correct';
      else if (o._picked) cls += ' wrong';
    }
    return `<button class="${cls}" data-i="${i}">${o.text}</button>`;
  }).join('');

  $('mainContent').innerHTML = `
    <div class="quiz-status">
      <span>문제 ${state.quizIdx + 1} / ${qTotal}</span>
      <span>정답: ${state.quizScore}</span>
    </div>
    <div class="quiz-question">${v[0]}</div>
    ${v[1] ? `<div class="quiz-pos">${v[1]}</div>` : '<div class="quiz-pos">&nbsp;</div>'}
    <div class="quiz-options">${opts}</div>
    ${state.quizAnswered ? `<div style="text-align:center;margin-top:8px;"><button class="btn" id="nextQ">다음 문제 →</button></div>` : ''}
  `;

  $('mainContent').querySelectorAll('.quiz-option').forEach(btn => {
    btn.onclick = () => {
      if (state.quizAnswered) return;
      const i = parseInt(btn.dataset.i);
      state.quizOptions[i]._picked = true;
      state.quizAnswered = true;
      if (state.quizOptions[i].correct) {
        state.quizScore++;
        state.known[state.day].add(correctIdx);
        saveProgress();
      }
      renderNav();
      renderQuiz();
      renderProgress();
    };
  });
  if ($('nextQ')) {
    $('nextQ').onclick = () => {
      state.quizIdx++;
      state.quizAnswered = false;
      if (state.quizIdx < qTotal) prepareQuizOptions();
      renderQuiz();
    };
  }
}

function renderContent() {
  if (state.mode === 'browse') renderBrowse();
  else if (state.mode === 'flashcard') renderFlashcard();
  else if (state.mode === 'quiz') renderQuiz();
}

function renderProgress() {
  let totalKnown = 0, totalAll = 0;
  for (let d = 1; d <= TOTAL_DAYS; d++) {
    totalKnown += state.known[d].size;
    totalAll += VOCAB[d].length;
  }
  const dayKnown = state.known[state.day].size;
  const dayTotal = VOCAB[state.day].length;
  const overallPct = Math.round((totalKnown / totalAll) * 100);
  $('progressInfo').innerHTML = `
    <div>
      <span class="progress-label">Day ${state.day}: </span>
      <span class="progress-value">${dayKnown} / ${dayTotal}</span>
      <span style="margin:0 10px;color:var(--text-tertiary);">·</span>
      <span class="progress-label">전체: </span>
      <span class="progress-value">${totalKnown} / ${totalAll}</span>
      <span style="color:var(--text-tertiary);"> (${overallPct}%)</span>
    </div>
    <button class="reset-btn" id="resetBtn">진도 초기화</button>
  `;
  $('resetBtn').onclick = () => {
    if (confirm('모든 진도가 삭제됩니다. 정말 초기화할까요?')) {
      for (let d = 1; d <= TOTAL_DAYS; d++) state.known[d].clear();
      saveProgress();
      renderNav();
      renderContent();
      renderProgress();
    }
  };
}

function setMode(m) {
  state.mode = m;
  if (m === 'flashcard') { state.fcIdx = 0; state.flipped = false; }
  if (m === 'quiz') startQuiz();
  saveProgress();
  renderNav();
  renderContent();
}

function setDay(d) {
  state.day = d;
  state.fcIdx = 0;
  state.flipped = false;
  state.order[d] = state.shuffle
    ? shuffleArr(VOCAB[d].map((_, i) => i))
    : VOCAB[d].map((_, i) => i);
  if (state.mode === 'quiz') startQuiz();
  saveProgress();
  renderNav();
  renderContent();
  renderProgress();
  window.scrollTo(0, 0);
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (state.mode === 'flashcard') {
    if (e.key === 'ArrowLeft') { $('fcPrev')?.click(); }
    else if (e.key === 'ArrowRight') { $('fcNext')?.click(); }
    else if (e.key === ' ') { e.preventDefault(); $('fcCard')?.click(); }
    else if (e.key === 'o' || e.key === 'O') { $('fcKnown')?.click(); }
    else if (e.key === 'x' || e.key === 'X') { $('fcUnknown')?.click(); }
  } else if (state.mode === 'quiz') {
    if (['1','2','3','4'].includes(e.key)) {
      const btns = document.querySelectorAll('.quiz-option');
      btns[parseInt(e.key) - 1]?.click();
    } else if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      $('nextQ')?.click();
    }
  }
});

// Swipe navigation
let touchStartX = null, touchStartY = null;
document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
document.addEventListener('touchend', e => {
  if (touchStartX === null) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  touchStartX = null;
  if (Math.abs(dx) < 60 || Math.abs(dy) > 60) return;
  if (state.mode === 'flashcard') {
    if (dx < 0) $('fcNext')?.click();
    else $('fcPrev')?.click();
  }
}, { passive: true });

loadProgress();
if (state.mode === 'quiz') startQuiz();
renderNav();
renderContent();
renderProgress();
</script>
</body>
</html>
