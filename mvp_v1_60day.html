<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#faf9f6">
<title>MVP vol.1 · 60일 어휘 학습</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #faf9f6;
    --surface: #ffffff;
    --surface-alt: #f3f1ea;
    --border: rgba(0,0,0,0.08);
    --border-strong: rgba(0,0,0,0.18);
    --text: #1a1a1a;
    --text-secondary: #555;
    --text-tertiary: #888;
    --accent: #2563eb;
    --accent-bg: #eff4ff;
    --success: #0f6e56;
    --success-bg: #e1f5ee;
    --danger: #991b1b;
    --danger-bg: #fcebeb;
    --amber: #854f0b;
    --amber-bg: #faeeda;
    --radius: 8px;
    --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #18181a;
      --surface: #232325;
      --surface-alt: #2a2a2d;
      --border: rgba(255,255,255,0.08);
      --border-strong: rgba(255,255,255,0.18);
      --text: #eaeaea;
      --text-secondary: #b0b0b0;
      --text-tertiary: #888;
      --accent: #6ea3ff;
      --accent-bg: #1a2740;
      --success: #5dcaa5;
      --success-bg: #0f2a22;
      --danger: #f09595;
      --danger-bg: #3a1a1a;
      --amber: #fac775;
      --amber-bg: #3a2a12;
    }
  }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    padding: 20px 14px;
    padding-bottom: calc(20px + env(safe-area-inset-bottom));
  }
  .container { max-width: 920px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 18px; }
  .header h1 { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
  .header .sub { font-size: 12px; color: var(--text-secondary); }
  .nav-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 10px;
    margin-bottom: 14px;
  }
  .mode-tabs { display: flex; gap: 4px; margin-bottom: 10px; flex-wrap: wrap; }
  .mode-tab {
    flex: 1;
    min-width: 70px;
    padding: 10px 6px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 13px;
    color: var(--text-secondary);
    font-family: inherit;
    -webkit-appearance: none;
  }
  .mode-tab:active { background: var(--surface-alt); }
  .mode-tab.active {
    background: var(--accent-bg);
    color: var(--accent);
    border-color: var(--accent);
    font-weight: 500;
  }
  .mode-tab.review-tab.active {
    background: var(--danger-bg);
    color: var(--danger);
    border-color: var(--danger);
  }
  .day-grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 3px;
  }
  .day-btn {
    padding: 8px 0 12px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: transparent;
    cursor: pointer;
    font-size: 11px;
    color: var(--text-secondary);
    font-family: inherit;
    position: relative;
    -webkit-appearance: none;
    min-height: 36px;
  }
  .day-btn:active { background: var(--surface-alt); }
  .day-btn.active {
    background: var(--accent-bg);
    color: var(--accent);
    border-color: var(--accent);
    font-weight: 500;
  }
  .day-btn .pct {
    position: absolute;
    bottom: 1px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    color: var(--success);
  }
  .day-btn .unk-dot {
    position: absolute;
    top: 2px;
    right: 3px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--danger);
  }
  .day-btn.complete {
    border-color: var(--success);
    color: var(--success);
  }
  .scope-selector { display: flex; gap: 4px; margin-bottom: 10px; }
  .scope-btn {
    flex: 1;
    padding: 8px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 13px;
    color: var(--text-secondary);
    font-family: inherit;
  }
  .scope-btn.active {
    background: var(--danger-bg);
    color: var(--danger);
    border-color: var(--danger);
    font-weight: 500;
  }
  .options-row {
    display: flex;
    gap: 12px;
    align-items: center;
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .options-row label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
  .options-row input[type="checkbox"] { cursor: pointer; width: 16px; height: 16px; }
  .main {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px;
    min-height: 340px;
  }
  .word-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    margin-bottom: 5px;
    display: flex;
    gap: 10px;
    align-items: baseline;
    cursor: pointer;
    transition: background 0.1s;
  }
  .word-card:active { background: var(--surface-alt); }
  .word-card.known {
    background: var(--success-bg);
    border-color: var(--success);
  }
  .word-card.unknown {
    border-left: 3px solid var(--danger);
  }
  .word-num { font-size: 11px; color: var(--text-tertiary); min-width: 28px; }
  .word-day-tag {
    font-size: 10px;
    color: var(--text-tertiary);
    padding: 1px 5px;
    background: var(--surface-alt);
    border-radius: 10px;
    margin-left: 4px;
    white-space: nowrap;
  }
  .word-main { flex: 1; min-width: 0; }
  .word-header { display: flex; gap: 8px; align-items: baseline; margin-bottom: 2px; flex-wrap: wrap; }
  .word-text { font-size: 16px; font-weight: 500; word-break: break-word; }
  .word-pos {
    font-size: 11px;
    color: var(--text-tertiary);
    padding: 1px 6px;
    background: var(--surface-alt);
    border-radius: var(--radius);
    font-style: italic;
    white-space: nowrap;
  }
  .word-meaning { font-size: 14px; color: var(--text-secondary); line-height: 1.45; }
  .check-mark { font-size: 14px; color: var(--success); min-width: 16px; }
  .check-mark.unk { color: var(--danger); }
  .flashcard {
    min-height: 280px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 32px 20px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    text-align: center;
    transition: border-color 0.15s;
    -webkit-user-select: none;
    user-select: none;
  }
  .flashcard:active { border-color: var(--border-strong); }
  .flashcard-word { font-size: 40px; font-weight: 500; margin-bottom: 6px; word-break: break-word; line-height: 1.15; }
  .flashcard-pos { font-size: 14px; color: var(--text-tertiary); font-style: italic; margin-bottom: 12px; }
  .flashcard-meaning { font-size: 20px; color: var(--text); font-weight: 500; max-width: 640px; line-height: 1.45; margin-bottom: 12px; }
  .flashcard-hint { font-size: 12px; color: var(--text-tertiary); margin-top: 18px; }
  .flashcard-daylabel { font-size: 11px; color: var(--text-tertiary); margin-bottom: 8px; }
  .fc-nav {
    display: flex;
    gap: 6px;
    justify-content: space-between;
    align-items: center;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .fc-nav-side { display: flex; gap: 6px; flex-wrap: wrap; }
  .btn {
    padding: 10px 14px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: transparent;
    cursor: pointer;
    font-size: 14px;
    color: var(--text);
    font-family: inherit;
    -webkit-appearance: none;
    min-height: 40px;
    touch-action: manipulation;
  }
  .btn:active { background: var(--surface-alt); }
  .btn.success { color: var(--success); border-color: var(--success); }
  .btn.success:active { background: var(--success-bg); }
  .btn.danger { color: var(--danger); border-color: var(--danger); }
  .btn.danger:active { background: var(--danger-bg); }
  .fc-counter { font-size: 13px; color: var(--text-secondary); white-space: nowrap; padding: 0 6px; }
  .quiz-status {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 12px;
  }
  .quiz-question { font-size: 36px; font-weight: 500; text-align: center; margin: 20px 0 6px; word-break: break-word; line-height: 1.15; }
  .quiz-pos { font-size: 13px; color: var(--text-tertiary); font-style: italic; text-align: center; margin-bottom: 18px; }
  .quiz-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 10px;
  }
  @media (max-width: 600px) {
    body { padding: 14px 10px; }
    .quiz-options { grid-template-columns: 1fr; }
    .quiz-question { font-size: 28px; }
    .flashcard-word { font-size: 32px; }
    .flashcard-meaning { font-size: 18px; }
    .day-grid { grid-template-columns: repeat(6, 1fr); }
    .header h1 { font-size: 18px; }
    .main { padding: 14px; }
    .flashcard { padding: 28px 16px; min-height: 250px; }
  }
  .quiz-option {
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    cursor: pointer;
    font-size: 14px;
    text-align: left;
    color: var(--text);
    font-family: inherit;
    line-height: 1.4;
    transition: background 0.1s;
    -webkit-appearance: none;
    min-height: 44px;
    touch-action: manipulation;
  }
  .quiz-option:active:not(.disabled) { background: var(--surface-alt); }
  .quiz-option.correct {
    background: var(--success-bg);
    color: var(--success);
    border-color: var(--success);
    font-weight: 500;
  }
  .quiz-option.wrong {
    background: var(--danger-bg);
    color: var(--danger);
    border-color: var(--danger);
  }
  .quiz-option.disabled { cursor: default; pointer-events: none; }
  .quiz-result { text-align: center; padding: 28px 12px; }
  .quiz-score { font-size: 52px; font-weight: 500; line-height: 1; }
  .quiz-score-label { font-size: 14px; color: var(--text-secondary); margin-top: 8px; }
  .quiz-bar {
    margin: 20px auto;
    width: 280px;
    max-width: 100%;
    height: 8px;
    background: var(--surface-alt);
    border-radius: 4px;
    overflow: hidden;
  }
  .quiz-fill { height: 100%; background: var(--success); transition: width 0.6s ease; }
  .progress-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 12px;
    padding: 10px 14px;
    background: var(--surface-alt);
    border-radius: var(--radius);
    font-size: 13px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .progress-value { font-weight: 500; color: var(--text); }
  .progress-label { color: var(--text-secondary); }
  .progress-unk {
    color: var(--danger);
    font-weight: 500;
  }
  .reset-btn {
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--text-tertiary);
    font-size: 12px;
    text-decoration: underline;
    font-family: inherit;
    padding: 4px 6px;
  }
  .reset-btn:active { color: var(--danger); }
  .footer-note {
    text-align: center;
    font-size: 11px;
    color: var(--text-tertiary);
    margin-top: 14px;
  }
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-secondary);
  }
  .empty-state .icon {
    font-size: 40px;
    margin-bottom: 12px;
    opacity: 0.5;
  }
  .empty-state p { margin: 6px 0; font-size: 14px; }
  .empty-state .hint { font-size: 12px; color: var(--text-tertiary); margin-top: 8px; }
  .review-summary {
    background: var(--danger-bg);
    border: 1px solid var(--danger);
    border-radius: var(--radius);
    padding: 10px 14px;
    margin-bottom: 12px;
    font-size: 13px;
    color: var(--danger);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }
  .review-summary-count { font-weight: 500; }
  .clear-unk-btn {
    background: transparent;
    border: 1px solid var(--danger);
    color: var(--danger);
    padding: 4px 10px;
    border-radius: var(--radius);
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>MVP vol.1 어휘 학습</h1>
    <div class="sub">60일 과정 · 3,000단어 (하루 50단어)</div>
  </div>
  <div class="nav-bar">
    <div class="mode-tabs" id="modeTabs"></div>
    <div id="daySection"></div>
  </div>
  <div class="main" id="mainContent"></div>
  <div class="progress-info" id="progressInfo"></div>
  <div class="footer-note">진도와 '모름' 단어는 브라우저에 자동 저장됩니다</div>
</div>

const TOTAL_DAYS = 60;
const STORAGE_KEY = 'mvp_progress_v1';

const state = {
  day: 1,
  mode: 'browse',      // 'browse' | 'flashcard' | 'quiz' | 'review'
  reviewScope: 'day',  // 'day' | 'all'  (used in review mode)
  fcIdx: 0,
  flipped: false,
  shuffle: false,
  quizIdx: 0,
  quizAnswered: false,
  quizScore: 0,
  quizOptions: [],
  quizOrder: [],
  known: {},           // {day: Set of indices known}
  unknown: {},         // {day: Set of indices marked unknown}
  order: {}
};

// Initialize
for (let d = 1; d <= TOTAL_DAYS; d++) {
  state.known[d] = new Set();
  state.unknown[d] = new Set();
  state.order[d] = VOCAB[d].map((_, i) => i);
}

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.known) {
      for (const d in data.known) {
        if (state.known[d]) state.known[d] = new Set(data.known[d]);
      }
    }
    if (data.unknown) {
      for (const d in data.unknown) {
        if (state.unknown[d]) state.unknown[d] = new Set(data.unknown[d]);
      }
    }
    if (data.day) state.day = data.day;
    if (data.mode) state.mode = data.mode;
    if (data.reviewScope) state.reviewScope = data.reviewScope;
  } catch (e) {
    console.warn('Failed to load progress', e);
  }
}

function saveProgress() {
  try {
    const knownObj = {};
    const unknownObj = {};
    for (const d in state.known) knownObj[d] = [...state.known[d]];
    for (const d in state.unknown) unknownObj[d] = [...state.unknown[d]];
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      known: knownObj,
      unknown: unknownObj,
      day: state.day,
      mode: state.mode,
      reviewScope: state.reviewScope
    }));
  } catch (e) {
    console.warn('Failed to save progress', e);
  }
}

const $ = id => document.getElementById(id);

function shuffleArr(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function markUnknown(day, idx) {
  state.unknown[day].add(idx);
  state.known[day].delete(idx);
}

function markKnown(day, idx) {
  state.known[day].add(idx);
  state.unknown[day].delete(idx);
}

function unmarkAll(day, idx) {
  state.known[day].delete(idx);
  state.unknown[day].delete(idx);
}

// Count total unknown words
function countUnknownAll() {
  let total = 0;
  for (let d = 1; d <= TOTAL_DAYS; d++) total += state.unknown[d].size;
  return total;
}

// Get current words to display based on mode
function currentWords() {
  if (state.mode === 'review') {
    // Build list of {day, idx, word, pos, meaning}
    const list = [];
    if (state.reviewScope === 'day') {
      const indices = [...state.unknown[state.day]].sort((a, b) => a - b);
      indices.forEach(i => {
        const v = VOCAB[state.day][i];
        list.push({ day: state.day, idx: i, w: v[0], p: v[1], m: v[2] });
      });
    } else {
      // All days
      for (let d = 1; d <= TOTAL_DAYS; d++) {
        const indices = [...state.unknown[d]].sort((a, b) => a - b);
        indices.forEach(i => {
          const v = VOCAB[d][i];
          list.push({ day: d, idx: i, w: v[0], p: v[1], m: v[2] });
        });
      }
    }
    return list;
  }
  // Browse / flashcard / quiz use day order
  return state.order[state.day].map(i => {
    const v = VOCAB[state.day][i];
    return { day: state.day, idx: i, w: v[0], p: v[1], m: v[2] };
  });
}

function pickWrongMeanings(excludeMeaning, n) {
  const pool = [];
  for (let d = 1; d <= TOTAL_DAYS; d++) {
    VOCAB[d].forEach(v => {
      if (v[2] !== excludeMeaning) pool.push(v[2]);
    });
  }
  return shuffleArr(pool).slice(0, n);
}

function renderNav() {
  const unkTotal = countUnknownAll();
  const modes = [
    { id: 'browse', label: '단어장' },
    { id: 'flashcard', label: '플래시카드' },
    { id: 'quiz', label: '퀴즈' },
    { id: 'review', label: `모름 ${unkTotal > 0 ? '(' + unkTotal + ')' : ''}`, review: true }
  ];
  $('modeTabs').innerHTML = modes.map(m => {
    let cls = 'mode-tab';
    if (m.review) cls += ' review-tab';
    if (state.mode === m.id) cls += ' active';
    return `<button class="${cls}" data-mode="${m.id}">${m.label}</button>`;
  }).join('');
  $('modeTabs').querySelectorAll('.mode-tab').forEach(btn => {
    btn.onclick = () => setMode(btn.dataset.mode);
  });

  // Day section: normal day grid OR review scope selector
  if (state.mode === 'review') {
    const unkDay = state.unknown[state.day].size;
    const unkAll = countUnknownAll();
    $('daySection').innerHTML = `
      <div class="scope-selector">
        <button class="scope-btn ${state.reviewScope === 'day' ? 'active' : ''}" data-scope="day">
          Day ${state.day}의 모름 (${unkDay})
        </button>
        <button class="scope-btn ${state.reviewScope === 'all' ? 'active' : ''}" data-scope="all">
          전체 모름 (${unkAll})
        </button>
      </div>
    `;
    $('daySection').querySelectorAll('.scope-btn').forEach(btn => {
      btn.onclick = () => setReviewScope(btn.dataset.scope);
    });
  } else {
    let dayHtml = '<div class="day-grid">';
    for (let d = 1; d <= TOTAL_DAYS; d++) {
      const total = VOCAB[d].length;
      const known = state.known[d].size;
      const unk = state.unknown[d].size;
      const complete = known === total && total > 0;
      const pct = total > 0 ? Math.round((known / total) * 100) : 0;
      const pctText = known > 0 && !complete ? `<span class="pct">${pct}%</span>` : '';
      const unkDot = unk > 0 ? '<span class="unk-dot"></span>' : '';
      dayHtml += `<button class="day-btn ${state.day === d ? 'active' : ''} ${complete ? 'complete' : ''}" data-day="${d}">${unkDot}${d}${pctText}</button>`;
    }
    dayHtml += '</div>';
    $('daySection').innerHTML = dayHtml;
    $('daySection').querySelectorAll('.day-btn').forEach(btn => {
      btn.onclick = () => setDay(parseInt(btn.dataset.day));
    });
  }
}

function renderBrowse() {
  const words = currentWords();
  const head = `
    <div class="options-row">
      <label><input type="checkbox" id="shuffleChk" ${state.shuffle ? 'checked' : ''}> 순서 섞기</label>
      <span style="color: var(--text-tertiary);">·</span>
      <span>탭: 암기 완료 · 길게 눌러 모름 표시</span>
    </div>
  `;
  const list = words.map((v, i) => {
    const isKnown = state.known[v.day].has(v.idx);
    const isUnk = state.unknown[v.day].has(v.idx);
    let cls = 'word-card';
    if (isKnown) cls += ' known';
    if (isUnk) cls += ' unknown';
    const mark = isKnown ? '✓' : (isUnk ? '✗' : '');
    const markCls = isKnown ? 'check-mark' : 'check-mark unk';
    return `<div class="${cls}" data-idx="${v.idx}" data-day="${v.day}">
      <div class="word-num">${String(i+1).padStart(2,'0')}</div>
      <div class="word-main">
        <div class="word-header">
          <span class="word-text">${v.w}</span>
          ${v.p ? `<span class="word-pos">${v.p}</span>` : ''}
        </div>
        <div class="word-meaning">${v.m}</div>
      </div>
      <div class="${markCls}">${mark}</div>
    </div>`;
  }).join('');
  $('mainContent').innerHTML = head + list;
  $('shuffleChk').onchange = e => {
    state.shuffle = e.target.checked;
    state.order[state.day] = state.shuffle
      ? shuffleArr(VOCAB[state.day].map((_, i) => i))
      : VOCAB[state.day].map((_, i) => i);
    renderContent();
  };

  // Tap = toggle known; Long-press = mark as unknown
  $('mainContent').querySelectorAll('.word-card').forEach(card => {
    const idx = parseInt(card.dataset.idx);
    const day = parseInt(card.dataset.day);
    let pressTimer = null;
    let longPressed = false;

    const start = () => {
      longPressed = false;
      pressTimer = setTimeout(() => {
        longPressed = true;
        // Toggle unknown
        if (state.unknown[day].has(idx)) state.unknown[day].delete(idx);
        else markUnknown(day, idx);
        saveProgress();
        renderNav();
        renderBrowse();
        renderProgress();
      }, 500);
    };
    const cancel = () => {
      if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
    };
    const click = (e) => {
      if (longPressed) { e.preventDefault(); return; }
      if (state.known[day].has(idx)) state.known[day].delete(idx);
      else markKnown(day, idx);
      saveProgress();
      renderNav();
      renderBrowse();
      renderProgress();
    };

    card.addEventListener('touchstart', start, { passive: true });
    card.addEventListener('touchend', cancel);
    card.addEventListener('touchmove', cancel);
    card.addEventListener('mousedown', start);
    card.addEventListener('mouseup', cancel);
    card.addEventListener('mouseleave', cancel);
    card.addEventListener('click', click);
  });
}

function renderFlashcard() {
  const words = currentWords();
  if (words.length === 0) {
    if (state.mode === 'review') {
      $('mainContent').innerHTML = `
        <div class="empty-state">
          <div class="icon">✓</div>
          <p>복습할 단어가 없습니다</p>
          <p class="hint">플래시카드에서 '모름' 버튼을 누르면 여기로 모입니다</p>
        </div>`;
    }
    return;
  }
  if (state.fcIdx >= words.length) state.fcIdx = 0;
  const v = words[state.fcIdx];
  const total = words.length;
  const isKnown = state.known[v.day].has(v.idx);
  const isUnk = state.unknown[v.day].has(v.idx);

  const isReview = state.mode === 'review';
  const head = isReview ? '' : `
    <div class="options-row">
      <label><input type="checkbox" id="shuffleFc" ${state.shuffle ? 'checked' : ''}> 순서 섞기</label>
    </div>
  `;

  const reviewHeader = isReview ? `
    <div class="review-summary">
      <span class="review-summary-count">복습 중: ${state.reviewScope === 'day' ? 'Day ' + state.day : '전체'} · ${total}개</span>
      <button class="clear-unk-btn" id="clearUnkBtn">이 단어 모름 해제</button>
    </div>
  ` : '';

  const dayLabel = isReview ? `<div class="flashcard-daylabel">Day ${v.day}</div>` : '';

  let statusText = '';
  if (isKnown) statusText = ' · ✓ 암기됨';
  else if (isUnk) statusText = ' · ✗ 모름';

  const card = state.flipped
    ? `<div class="flashcard" id="fcCard">
        ${dayLabel}
        <div class="flashcard-pos">${v.w}${v.p ? ' · ' + v.p : ''}</div>
        <div class="flashcard-meaning">${v.m}</div>
        <div class="flashcard-hint">카드 탭 → 영어 단어로</div>
       </div>`
    : `<div class="flashcard" id="fcCard">
        ${dayLabel}
        <div class="flashcard-word">${v.w}</div>
        ${v.p ? `<div class="flashcard-pos">${v.p}</div>` : ''}
        <div class="flashcard-hint">카드 탭 → 뜻 보기${statusText}</div>
       </div>`;

  const nav = `
    <div class="fc-nav">
      <button class="btn" id="fcPrev">← 이전</button>
      <span class="fc-counter">${state.fcIdx + 1} / ${total}</span>
      <div class="fc-nav-side">
        <button class="btn danger" id="fcUnknown">모름</button>
        <button class="btn success" id="fcKnown">암기</button>
        <button class="btn" id="fcNext">다음 →</button>
      </div>
    </div>
  `;
  $('mainContent').innerHTML = reviewHeader + head + card + nav;

  if ($('shuffleFc')) {
    $('shuffleFc').onchange = e => {
      state.shuffle = e.target.checked;
      state.order[state.day] = state.shuffle
        ? shuffleArr(VOCAB[state.day].map((_, i) => i))
        : VOCAB[state.day].map((_, i) => i);
      state.fcIdx = 0;
      state.flipped = false;
      renderContent();
    };
  }
  if ($('clearUnkBtn')) {
    $('clearUnkBtn').onclick = () => {
      state.unknown[v.day].delete(v.idx);
      saveProgress();
      renderNav();
      // If list becomes empty, go back to first; otherwise stay same index
      const newWords = currentWords();
      if (state.fcIdx >= newWords.length) state.fcIdx = Math.max(0, newWords.length - 1);
      renderFlashcard();
      renderProgress();
    };
  }

  $('fcCard').onclick = () => {
    state.flipped = !state.flipped;
    renderFlashcard();
  };
  $('fcPrev').onclick = e => {
    e.stopPropagation();
    state.fcIdx = (state.fcIdx - 1 + total) % total;
    state.flipped = false;
    renderFlashcard();
  };
  $('fcNext').onclick = e => {
    e.stopPropagation();
    state.fcIdx = (state.fcIdx + 1) % total;
    state.flipped = false;
    renderFlashcard();
  };
  $('fcKnown').onclick = e => {
    e.stopPropagation();
    markKnown(v.day, v.idx);
    saveProgress();
    renderNav();
    renderProgress();
    if (isReview) {
      // Removed from list. Stay on same index (next unknown slides in)
      const newWords = currentWords();
      if (newWords.length === 0) { renderFlashcard(); return; }
      if (state.fcIdx >= newWords.length) state.fcIdx = 0;
      state.flipped = false;
      renderFlashcard();
    } else {
      state.fcIdx = (state.fcIdx + 1) % total;
      state.flipped = false;
      renderFlashcard();
    }
  };
  $('fcUnknown').onclick = e => {
    e.stopPropagation();
    markUnknown(v.day, v.idx);
    saveProgress();
    renderNav();
    renderProgress();
    state.fcIdx = (state.fcIdx + 1) % total;
    state.flipped = false;
    renderFlashcard();
  };
}

function startQuiz() {
  state.quizIdx = 0;
  state.quizScore = 0;
  state.quizAnswered = false;
  const words = currentWords();
  // For review mode, quiz uses only review words; for others, all day words
  if (state.mode === 'review') {
    state.quizOrder = shuffleArr(words.map(w => ({ day: w.day, idx: w.idx })));
  } else {
    const indices = VOCAB[state.day].map((_, i) => i);
    state.quizOrder = shuffleArr(indices).map(i => ({ day: state.day, idx: i }));
  }
  if (state.quizOrder.length > 0) prepareQuizOptions();
}

function prepareQuizOptions() {
  const item = state.quizOrder[state.quizIdx];
  const correct = VOCAB[item.day][item.idx];
  const wrongs = pickWrongMeanings(correct[2], 3);
  const options = shuffleArr([correct[2], ...wrongs]);
  state.quizOptions = options.map(m => ({ text: m, correct: m === correct[2], _picked: false }));
}

function renderQuiz() {
  const qTotal = state.quizOrder.length;
  if (qTotal === 0) {
    $('mainContent').innerHTML = `
      <div class="empty-state">
        <div class="icon">✓</div>
        <p>퀴즈에 포함할 단어가 없습니다</p>
      </div>`;
    return;
  }
  if (state.quizIdx >= qTotal) {
    const pct = Math.round((state.quizScore / qTotal) * 100);
    $('mainContent').innerHTML = `
      <div class="quiz-result">
        <div class="quiz-score">${state.quizScore} / ${qTotal}</div>
        <div class="quiz-score-label">정답률 ${pct}%</div>
        <div class="quiz-bar"><div class="quiz-fill" style="width:${pct}%"></div></div>
        <button class="btn" id="restartQuiz">다시 풀기</button>
      </div>
    `;
    $('restartQuiz').onclick = () => { startQuiz(); renderQuiz(); };
    return;
  }

  const item = state.quizOrder[state.quizIdx];
  const v = VOCAB[item.day][item.idx];

  const opts = state.quizOptions.map((o, i) => {
    let cls = 'quiz-option';
    if (state.quizAnswered) {
      cls += ' disabled';
      if (o.correct) cls += ' correct';
      else if (o._picked) cls += ' wrong';
    }
    return `<button class="${cls}" data-i="${i}">${o.text}</button>`;
  }).join('');

  const dayPrefix = state.mode === 'review' ? `Day ${item.day} · ` : '';

  $('mainContent').innerHTML = `
    <div class="quiz-status">
      <span>${dayPrefix}문제 ${state.quizIdx + 1} / ${qTotal}</span>
      <span>정답: ${state.quizScore}</span>
    </div>
    <div class="quiz-question">${v[0]}</div>
    ${v[1] ? `<div class="quiz-pos">${v[1]}</div>` : '<div class="quiz-pos">&nbsp;</div>'}
    <div class="quiz-options">${opts}</div>
    ${state.quizAnswered ? `<div style="text-align:center;margin-top:8px;"><button class="btn" id="nextQ">다음 문제 →</button></div>` : ''}
  `;

  $('mainContent').querySelectorAll('.quiz-option').forEach(btn => {
    btn.onclick = () => {
      if (state.quizAnswered) return;
      const i = parseInt(btn.dataset.i);
      state.quizOptions[i]._picked = true;
      state.quizAnswered = true;
      if (state.quizOptions[i].correct) {
        state.quizScore++;
        markKnown(item.day, item.idx);
      } else {
        markUnknown(item.day, item.idx);
      }
      saveProgress();
      renderNav();
      renderQuiz();
      renderProgress();
    };
  });
  if ($('nextQ')) {
    $('nextQ').onclick = () => {
      state.quizIdx++;
      state.quizAnswered = false;
      if (state.quizIdx < qTotal) prepareQuizOptions();
      renderQuiz();
    };
  }
}

function renderReviewList() {
  const words = currentWords();
  if (words.length === 0) {
    const msg = state.reviewScope === 'day'
      ? `Day ${state.day}에 '모름' 표시된 단어가 없습니다`
      : `전체에 '모름' 표시된 단어가 없습니다`;
    $('mainContent').innerHTML = `
      <div class="empty-state">
        <div class="icon">✓</div>
        <p>${msg}</p>
        <p class="hint">플래시카드나 단어장에서 '모름' 표시한 단어가 여기 모입니다</p>
      </div>`;
    return;
  }

  const modeButtons = `
    <div class="options-row">
      <button class="btn" id="startFcReview">플래시카드로 복습</button>
      <button class="btn" id="startQuizReview">퀴즈로 복습</button>
    </div>
  `;

  const list = words.map((v, i) => {
    const isKnown = state.known[v.day].has(v.idx);
    let cls = 'word-card unknown';
    if (isKnown) cls += ' known';
    return `<div class="${cls}" data-idx="${v.idx}" data-day="${v.day}">
      <div class="word-num">${String(i+1).padStart(2,'0')}</div>
      <div class="word-main">
        <div class="word-header">
          <span class="word-text">${v.w}</span>
          ${v.p ? `<span class="word-pos">${v.p}</span>` : ''}
          ${state.reviewScope === 'all' ? `<span class="word-day-tag">Day ${v.day}</span>` : ''}
        </div>
        <div class="word-meaning">${v.m}</div>
      </div>
      <div class="check-mark unk">✗</div>
    </div>`;
  }).join('');
  $('mainContent').innerHTML = modeButtons + list;

  $('startFcReview').onclick = () => {
    // Stay in review mode but switch to flashcard view
    state.mode = 'review';
    state.fcIdx = 0;
    state.flipped = false;
    // Temporarily mark that we want flashcard display
    window._reviewView = 'flashcard';
    renderFlashcard();
  };
  $('startQuizReview').onclick = () => {
    window._reviewView = 'quiz';
    startQuiz();
    renderQuiz();
  };

  // Tap on card removes from unknown list
  $('mainContent').querySelectorAll('.word-card').forEach(card => {
    card.onclick = () => {
      const idx = parseInt(card.dataset.idx);
      const day = parseInt(card.dataset.day);
      state.unknown[day].delete(idx);
      saveProgress();
      renderNav();
      renderReviewList();
      renderProgress();
    };
  });
}

function renderContent() {
  if (state.mode === 'browse') renderBrowse();
  else if (state.mode === 'flashcard') renderFlashcard();
  else if (state.mode === 'quiz') renderQuiz();
  else if (state.mode === 'review') {
    if (window._reviewView === 'flashcard') renderFlashcard();
    else if (window._reviewView === 'quiz') renderQuiz();
    else renderReviewList();
  }
}

function renderProgress() {
  let totalKnown = 0, totalAll = 0, totalUnk = 0;
  for (let d = 1; d <= TOTAL_DAYS; d++) {
    totalKnown += state.known[d].size;
    totalUnk += state.unknown[d].size;
    totalAll += VOCAB[d].length;
  }
  const dayKnown = state.known[state.day].size;
  const dayTotal = VOCAB[state.day].length;
  const dayUnk = state.unknown[state.day].size;
  const overallPct = Math.round((totalKnown / totalAll) * 100);
  $('progressInfo').innerHTML = `
    <div>
      <span class="progress-label">Day ${state.day}: </span>
      <span class="progress-value">${dayKnown} / ${dayTotal}</span>
      ${dayUnk > 0 ? `<span class="progress-unk"> · 모름 ${dayUnk}</span>` : ''}
      <span style="margin:0 10px;color:var(--text-tertiary);">·</span>
      <span class="progress-label">전체: </span>
      <span class="progress-value">${totalKnown} / ${totalAll}</span>
      <span style="color:var(--text-tertiary);"> (${overallPct}%)</span>
      ${totalUnk > 0 ? `<span class="progress-unk"> · 모름 ${totalUnk}</span>` : ''}
    </div>
    <button class="reset-btn" id="resetBtn">진도 초기화</button>
  `;
  $('resetBtn').onclick = () => {
    if (confirm('모든 진도(암기·모름 표시 포함)가 삭제됩니다. 정말 초기화할까요?')) {
      for (let d = 1; d <= TOTAL_DAYS; d++) {
        state.known[d].clear();
        state.unknown[d].clear();
      }
      saveProgress();
      renderNav();
      renderContent();
      renderProgress();
    }
  };
}

function setMode(m) {
  state.mode = m;
  window._reviewView = null;
  if (m === 'flashcard') { state.fcIdx = 0; state.flipped = false; }
  if (m === 'quiz') startQuiz();
  if (m === 'review') { state.fcIdx = 0; state.flipped = false; }
  saveProgress();
  renderNav();
  renderContent();
  window.scrollTo(0, 0);
}

function setDay(d) {
  state.day = d;
  state.fcIdx = 0;
  state.flipped = false;
  state.order[d] = state.shuffle
    ? shuffleArr(VOCAB[d].map((_, i) => i))
    : VOCAB[d].map((_, i) => i);
  if (state.mode === 'quiz') startQuiz();
  saveProgress();
  renderNav();
  renderContent();
  renderProgress();
  window.scrollTo(0, 0);
}

function setReviewScope(scope) {
  state.reviewScope = scope;
  state.fcIdx = 0;
  state.flipped = false;
  window._reviewView = null;
  if (state.mode === 'review') startQuiz();
  saveProgress();
  renderNav();
  renderContent();
  window.scrollTo(0, 0);
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  const inFc = state.mode === 'flashcard' || (state.mode === 'review' && window._reviewView === 'flashcard');
  const inQuiz = state.mode === 'quiz' || (state.mode === 'review' && window._reviewView === 'quiz');
  if (inFc) {
    if (e.key === 'ArrowLeft') { $('fcPrev')?.click(); }
    else if (e.key === 'ArrowRight') { $('fcNext')?.click(); }
    else if (e.key === ' ') { e.preventDefault(); $('fcCard')?.click(); }
    else if (e.key === 'o' || e.key === 'O') { $('fcKnown')?.click(); }
    else if (e.key === 'x' || e.key === 'X') { $('fcUnknown')?.click(); }
  } else if (inQuiz) {
    if (['1','2','3','4'].includes(e.key)) {
      const btns = document.querySelectorAll('.quiz-option');
      btns[parseInt(e.key) - 1]?.click();
    } else if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      $('nextQ')?.click();
    }
  }
});

// Swipe navigation
let touchStartX = null, touchStartY = null;
document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
document.addEventListener('touchend', e => {
  if (touchStartX === null) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  touchStartX = null;
  if (Math.abs(dx) < 60 || Math.abs(dy) > 60) return;
  const inFc = state.mode === 'flashcard' || (state.mode === 'review' && window._reviewView === 'flashcard');
  if (inFc) {
    if (dx < 0) $('fcNext')?.click();
    else $('fcPrev')?.click();
  }
}, { passive: true });

loadProgress();
if (state.mode === 'quiz') startQuiz();
renderNav();
renderContent();
renderProgress();
</script>
</body>
</html>
