<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>MVP vol.1 · 6일 복습</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f7f6f2;--surface:#fff;--surface2:#f0ede6;--border:rgba(0,0,0,.09);
  --border2:rgba(0,0,0,.18);--text:#1a1a1a;--sub:#555;--ter:#999;
  --accent:#2563eb;--acc-bg:#eff4ff;--danger:#dc2626;--dan-bg:#fef2f2;
  --success:#16a34a;--suc-bg:#f0fdf4;--amber:#b45309;--amb-bg:#fffbeb;
  --radius:8px;--card-shadow:0 1px 4px rgba(0,0,0,.08);
}
@media(prefers-color-scheme:dark){
  :root{--bg:#18181b;--surface:#27272a;--surface2:#3f3f46;--border:rgba(255,255,255,.08);
  --border2:rgba(255,255,255,.18);--text:#e4e4e7;--sub:#a1a1aa;--ter:#71717a;
  --accent:#60a5fa;--acc-bg:#1e3a5f;--danger:#f87171;--dan-bg:#3f1515;
  --success:#4ade80;--suc-bg:#14291f;--amber:#fbbf24;--amb-bg:#2d2006;}
}
html{-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}

/* ── TOP NAV ── */
.top-nav{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:10px 14px;position:sticky;top:0;z-index:50;
}
.nav-inner{max-width:800px;margin:0 auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.nav-title{font-size:15px;font-weight:600;flex:1;min-width:120px}
.nav-title span{font-size:12px;color:var(--sub);font-weight:400}

/* SET SELECTOR */
.set-tabs{display:flex;gap:4px;flex-wrap:wrap}
.set-btn{
  padding:5px 9px;border:1px solid var(--border2);border-radius:6px;
  background:transparent;color:var(--sub);font-size:12px;cursor:pointer;transition:.15s;
}
.set-btn:hover{background:var(--surface2)}
.set-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ── CONTROLS ── */
.controls{
  max-width:800px;margin:12px auto;padding:0 12px;
  display:flex;gap:8px;flex-wrap:wrap;align-items:center;
}
.ctrl-btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:7px 13px;border-radius:var(--radius);border:1px solid var(--border2);
  background:var(--surface);color:var(--text);font-size:13px;cursor:pointer;
  transition:.15s;white-space:nowrap;
}
.ctrl-btn:hover{background:var(--surface2)}
.ctrl-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.ctrl-btn.primary:hover{opacity:.88}
.ctrl-btn.danger{background:var(--danger);color:#fff;border-color:var(--danger)}
.ctrl-btn.danger:hover{opacity:.88}
.ctrl-btn.amber-btn{background:var(--amber);color:#fff;border-color:var(--amber)}
.ctrl-btn.amber-btn:hover{opacity:.88}
.spacer{flex:1}

.stats-bar{
  max-width:800px;margin:0 auto 10px;padding:0 12px;
  display:flex;gap:10px;font-size:12px;color:var(--sub);flex-wrap:wrap;align-items:center;
}
.stat-item{display:flex;align-items:center;gap:4px}
.stat-dot{width:8px;height:8px;border-radius:50%;display:inline-block}

/* ── PROGRESS BAR ── */
.progress-wrap{max-width:800px;margin:0 auto 14px;padding:0 12px}
.progress-track{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}

/* ── CARD LIST ── */
.card-list{max-width:800px;margin:0 auto;padding:0 12px 80px;display:flex;flex-direction:column;gap:8px}

/* WORD CARD */
.word-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:12px 14px;display:grid;
  grid-template-columns: 28px 1fr auto;
  grid-template-rows: auto auto;
  column-gap:10px;row-gap:4px;
  box-shadow:var(--card-shadow);transition:.15s;
}
.word-card.unknown{border-left:3px solid var(--danger);background:var(--dan-bg)}
.word-card.known{opacity:.65}

/* col1: number */
.card-num{
  grid-column:1;grid-row:1/3;
  font-size:11px;color:var(--ter);
  display:flex;align-items:center;justify-content:center;
  align-self:start;padding-top:2px;
}
/* col2: word info */
.card-main{grid-column:2;grid-row:1;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.card-word{font-size:17px;font-weight:600;letter-spacing:.01em}
.card-pos{font-size:11px;color:var(--ter);padding:1px 5px;background:var(--surface2);border-radius:4px}
.card-ipa{font-size:12px;color:var(--sub);font-style:italic}

/* meaning row */
.card-meaning-row{grid-column:2;grid-row:2;display:flex;align-items:center;gap:8px}
.card-meaning{font-size:13px;color:var(--sub)}
.meaning-hidden .card-meaning{display:none}
.reveal-btn{
  font-size:11px;padding:2px 8px;border-radius:4px;border:1px solid var(--border2);
  background:transparent;color:var(--sub);cursor:pointer;white-space:nowrap;
}
.reveal-btn:hover{background:var(--surface2)}
.reveal-btn.revealed{color:var(--accent);border-color:var(--accent)}

/* col3: actions */
.card-actions{grid-column:3;grid-row:1/3;display:flex;flex-direction:column;align-items:center;gap:8px;justify-content:center}
.tts-btn{
  width:34px;height:34px;border-radius:50%;border:1px solid var(--border);
  background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:16px;transition:.15s;flex-shrink:0;
}
.tts-btn:hover{background:var(--acc-bg);border-color:var(--accent)}
.tts-btn.playing{background:var(--acc-bg);border-color:var(--accent)}

.check-label{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer}
.check-box{
  width:22px;height:22px;border-radius:5px;border:2px solid var(--border2);
  background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:.15s;
}
.check-label input{display:none}
.check-label input:checked ~ .check-box{background:var(--danger);border-color:var(--danger)}
.check-label input:checked ~ .check-box::after{content:"✕";color:#fff;font-size:12px;font-weight:700}
.check-txt{font-size:9px;color:var(--ter);line-height:1}

/* ── UNKNOWN ONLY MODE ── */
.unknown-banner{
  max-width:800px;margin:0 auto 12px;padding:10px 14px;
  background:var(--dan-bg);border:1px solid var(--danger);border-radius:var(--radius);
  color:var(--danger);font-size:13px;display:flex;align-items:center;gap:8px;
}

/* ── EMPTY STATE ── */
.empty-state{
  max-width:800px;margin:40px auto;padding:40px 20px;text-align:center;
  color:var(--sub);font-size:14px;
}
.empty-state .big{font-size:36px;margin-bottom:8px}

/* ── DAY BADGE ── */
.day-divider{
  max-width:800px;margin:4px auto 2px;padding:0 12px;
}
.day-badge{
  display:inline-flex;align-items:center;gap:6px;
  font-size:11px;color:var(--ter);padding:2px 0;
}
.day-badge::before{content:'';display:inline-block;width:30px;height:1px;background:var(--border2)}
.day-badge::after{content:'';display:inline-block;width:30px;height:1px;background:var(--border2)}

@media(max-width:520px){
  .card-word{font-size:15px}
  .card-actions{gap:6px}
  .tts-btn{width:30px;height:30px;font-size:14px}
}
</style>
</head>
<body>

<!-- TOP NAV -->
<nav class="top-nav">
  <div class="nav-inner">
    <div class="nav-title">MVP vol.1 <span>6일 복습</span></div>
    <div class="set-tabs" id="setTabs"></div>
  </div>
</nav>

<div id="app">
  <!-- Controls -->
  <div class="controls" id="controlBar">
    <button class="ctrl-btn primary" onclick="shuffle()">🔀 순서 섞기</button>
    <button class="ctrl-btn" onclick="toggleAll()">👁 뜻 전체 보기/숨기기</button>
    <button class="ctrl-btn amber-btn" id="unknownModeBtn" onclick="toggleUnknownMode()">❌ 모름만 보기</button>
    <span class="spacer"></span>
    <button class="ctrl-btn" onclick="resetChecks()">↺ 체크 초기화</button>
  </div>

  <!-- Stats -->
  <div class="stats-bar" id="statsBar">
    <span class="stat-item"><span class="stat-dot" style="background:var(--text)"></span><span id="statTotal">0</span>개 전체</span>
    <span class="stat-item"><span class="stat-dot" style="background:var(--danger)"></span><span id="statUnknown">0</span>개 모름</span>
    <span class="stat-item"><span class="stat-dot" style="background:var(--success)"></span><span id="statKnown">0</span>개 암기 완료</span>
  </div>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <!-- Card list -->
  <div class="card-list" id="cardList"></div>
</div>

// 10 sets: set i = days (i*6+1) ~ (i*6+6)
const SETS = Array.from({length:10}, (_,i)=>({
  label: `${i*6+1}~${i*6+6}일`,
  days: Array.from({length:6}, (_,j)=> String(i*6+j+1))
}));

let curSet = 0;
let allWords = [];   // [{day, idx, word, pos, meaning, ipa}]
let order = [];      // indices into allWords
let unknownMode = false;
let allRevealed = false;
let ttsActive = null;

// ── INIT ──
function buildSet(setIdx) {
  curSet = setIdx;
  const days = SETS[setIdx].days;
  allWords = [];
  days.forEach(d => {
    VOCAB[d].forEach((v, i) => {
      allWords.push({day:d, idx:i, word:v[0], pos:v[1], meaning:v[2], ipa:v[3]});
    });
  });
  // Seeded shuffle (same seed per set for consistency with PDF)
  order = seededShuffle(allWords.map((_,i)=>i), setIdx * 42 + 7);
  allRevealed = false;
  unknownMode = false;
  updateUnknownBtn();
  render();
}

function seededShuffle(arr, seed) {
  const a = [...arr];
  let s = seed;
  for (let i = a.length-1; i > 0; i--) {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    const j = Math.abs(s) % (i+1);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function shuffle() {
  // True random shuffle
  const a = [...order];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  order = a;
  allRevealed = false;
  render();
}

// ── STORAGE ──
function storageKey(setIdx) { return `mvp_rev_unknown_s${setIdx}`; }
function loadUnknown() {
  try { return new Set(JSON.parse(localStorage.getItem(storageKey(curSet))) || []); }
  catch { return new Set(); }
}
function saveUnknown(set) {
  try { localStorage.setItem(storageKey(curSet), JSON.stringify([...set])); } catch {}
}
function getUnknownSet() { return loadUnknown(); }

// ── RENDER ──
function render() {
  const unknown = loadUnknown();
  const total = order.length;
  const unk = unknown.size;
  const known = total - unk;

  document.getElementById('statTotal').textContent = total;
  document.getElementById('statUnknown').textContent = unk;
  document.getElementById('statKnown').textContent = known;
  const pct = total ? Math.round(known/total*100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';

  const container = document.getElementById('cardList');
  container.innerHTML = '';

  // Unknown mode banner
  const existing = document.getElementById('unknownBanner');
  if (existing) existing.remove();
  if (unknownMode) {
    const banner = document.createElement('div');
    banner.id = 'unknownBanner';
    banner.className = 'unknown-banner';
    banner.innerHTML = `❌ <b>모름 단어만</b> 표시 중 (${unk}개)`;
    document.getElementById('progressFill').parentElement.parentElement.insertAdjacentElement('afterend', banner);
  }

  const displayOrder = unknownMode
    ? order.filter(i => unknown.has(makeKey(allWords[i])))
    : order;

  if (displayOrder.length === 0) {
    container.innerHTML = unknownMode
      ? '<div class="empty-state"><div class="big">🎉</div>모름으로 체크된 단어가 없습니다!</div>'
      : '<div class="empty-state"><div class="big">📚</div>단어가 없습니다.</div>';
    return;
  }

  displayOrder.forEach((i, listPos) => {
    const w = allWords[i];
    const isUnknown = unknown.has(makeKey(w));
    const key = makeKey(w);
    const card = document.createElement('div');
    card.className = 'word-card' + (isUnknown ? ' unknown' : (true ? '' : ' known'));
    card.dataset.key = key;

    const meaningHtml = w.meaning
      ? `<span class="card-meaning">${escHtml(w.meaning)}</span>`
      : `<span class="card-meaning" style="color:var(--ter);font-style:italic">뜻 없음</span>`;

    card.innerHTML = `
      <span class="card-num">${listPos+1}</span>
      <div class="card-main">
        <span class="card-word">${escHtml(w.word)}</span>
        ${w.pos ? `<span class="card-pos">${escHtml(w.pos)}</span>` : ''}
        ${w.ipa ? `<span class="card-ipa">[${escHtml(w.ipa)}]</span>` : ''}
      </div>
      <div class="card-actions">
        <button class="tts-btn" title="발음 듣기" onclick="speak('${escAttr(w.word)}', this)">🔊</button>
        <label class="check-label" title="모름 체크">
          <input type="checkbox" ${isUnknown?'checked':''} onchange="toggleUnknown('${key}', this)">
          <div class="check-box"></div>
          <span class="check-txt">모름</span>
        </label>
      </div>
      <div class="card-meaning-row ${allRevealed ? '' : 'meaning-hidden'}">
        <button class="reveal-btn ${allRevealed ? 'revealed' : ''}" onclick="revealOne(this)">${allRevealed ? '뜻 숨기기' : '뜻 보기'}</button>
        ${meaningHtml}
      </div>
    `;
    container.appendChild(card);
  });
}

function makeKey(w) { return `d${w.day}_${w.idx}`; }

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  if (!s) return '';
  return s.replace(/'/g,"\'").replace(/"/g,'&quot;');
}

// ── TTS ──
function speak(word, btn) {
  if (!window.speechSynthesis) { alert('이 브라우저는 TTS를 지원하지 않습니다.'); return; }
  window.speechSynthesis.cancel();
  if (ttsActive === btn) { ttsActive.classList.remove('playing'); ttsActive = null; return; }
  if (ttsActive) ttsActive.classList.remove('playing');
  const utt = new SpeechSynthesisUtterance(word);
  utt.lang = 'en-US';
  utt.rate = 0.85;
  const voices = speechSynthesis.getVoices();
  const eng = voices.find(v => v.lang.startsWith('en') && !v.lang.includes('IN'));
  if (eng) utt.voice = eng;
  btn.classList.add('playing');
  ttsActive = btn;
  utt.onend = utt.onerror = () => { btn.classList.remove('playing'); if(ttsActive===btn) ttsActive=null; };
  speechSynthesis.speak(utt);
}

// Preload voices
if (window.speechSynthesis) speechSynthesis.getVoices();
window.speechSynthesis && window.speechSynthesis.addEventListener('voiceschanged', () => speechSynthesis.getVoices());

// ── REVEAL ──
function revealOne(btn) {
  const row = btn.parentElement;
  const isHidden = row.classList.contains('meaning-hidden');
  if (isHidden) {
    row.classList.remove('meaning-hidden');
    btn.textContent = '뜻 숨기기';
    btn.classList.add('revealed');
  } else {
    row.classList.add('meaning-hidden');
    btn.textContent = '뜻 보기';
    btn.classList.remove('revealed');
  }
}

function toggleAll() {
  allRevealed = !allRevealed;
  render();
}

// ── UNKNOWN ──
function toggleUnknown(key, input) {
  const unknown = loadUnknown();
  if (input.checked) unknown.add(key);
  else unknown.delete(key);
  saveUnknown(unknown);

  // Update card class immediately
  const card = document.querySelector(`.word-card[data-key="${key}"]`);
  if (card) {
    card.classList.toggle('unknown', input.checked);
  }
  updateStats();
}

function updateStats() {
  const unknown = loadUnknown();
  const total = order.length;
  const unk = unknown.size;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statUnknown').textContent = unk;
  document.getElementById('statKnown').textContent = total - unk;
  const pct = total ? Math.round((total-unk)/total*100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  // Update banner
  const banner = document.getElementById('unknownBanner');
  if (banner) banner.innerHTML = `❌ <b>모름 단어만</b> 표시 중 (${unk}개)`;
}

function toggleUnknownMode() {
  unknownMode = !unknownMode;
  updateUnknownBtn();
  render();
}

function updateUnknownBtn() {
  const btn = document.getElementById('unknownModeBtn');
  if (unknownMode) {
    btn.textContent = '📚 전체 보기';
    btn.classList.remove('amber-btn');
    btn.classList.add('primary');
  } else {
    btn.textContent = '❌ 모름만 보기';
    btn.classList.add('amber-btn');
    btn.classList.remove('primary');
  }
}

function resetChecks() {
  if (!confirm('이 세트의 모름 체크를 모두 초기화할까요?')) return;
  try { localStorage.removeItem(storageKey(curSet)); } catch {}
  render();
}

// ── SET TABS ──
function buildSetTabs() {
  const container = document.getElementById('setTabs');
  SETS.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'set-btn' + (i === 0 ? ' active' : '');
    btn.textContent = s.label;
    btn.onclick = () => selectSet(i);
    container.appendChild(btn);
  });
}

function selectSet(i) {
  document.querySelectorAll('.set-btn').forEach((b,j) => b.classList.toggle('active', j===i));
  buildSet(i);
}

buildSetTabs();
buildSet(0);
</script>
</body>
</html>
